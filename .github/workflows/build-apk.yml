name: Build APK + Deploy Supabase

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ── Deploy Edge Function to Supabase (auto, skips gracefully if no token) ──
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy kai-brain to Supabase
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "⚠ No SUPABASE_ACCESS_TOKEN — skipping. Add it in repo Settings > Secrets."
            exit 0
          fi
          supabase functions deploy kai-brain \
            --project-ref hpjvnohzhpkopisfaemz \
            --no-verify-jwt
          echo "✓ kai-brain deployed to Supabase"

      # ── Android APK Build ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install npm dependencies
        run: |
          [ -f package.json ] && npm install || true

      - name: Add Android platform
        run: cordova platform add android --save

      - name: Build release APK
        run: cordova build android --release

      - name: Sign and align APK
        run: |
          set -e
          APK_DIR="platforms/android/app/build/outputs/apk/release"
          UNSIGNED="$APK_DIR/app-release-unsigned.apk"
          SIGNED="$APK_DIR/kai.apk"
          KS="$GITHUB_WORKSPACE/keystore/debug.keystore"

          echo "=== Signing ==="
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$KS" \
            -storepass android \
            -keypass android \
            "$UNSIGNED" \
            androiddebugkey

          echo "=== Finding zipalign ==="
          ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -name zipalign | sort -V | tail -1)
          echo "zipalign: $ZIPALIGN"

          echo "=== Aligning ==="
          "$ZIPALIGN" -v 4 "$UNSIGNED" "$SIGNED"
          echo "✓ Done: $SIGNED"
          ls -lh "$SIGNED"

      - name: Get build tag from commit message
        id: tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          TAG=$(echo "$MSG" | grep -oP '(?i)(?<=build )[A-Z]+' | head -1 | tr '[:lower:]' '[:upper:]')
          [ -z "$TAG" ] && TAG="BUILD-$(date +%Y%m%d-%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: ${{ github.event.head_commit.message }}
          files: platforms/android/app/build/outputs/apk/release/kai.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
