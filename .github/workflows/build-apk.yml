name: Build KAI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "platforms;android-33" "build-tools;33.0.2" "build-tools;34.0.0"

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Pin Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH
          echo "GRADLE_HOME=/opt/gradle-8.7" >> $GITHUB_ENV

      - name: Train KAI (CPU stage — voice + identity packs)
        run: |
          set -e
          # DB ships gzipped in repo; expand to raw for training AND for bundling, drop the gz
          if [ -f www/app_corpus.db.gz ]; then gunzip -f www/app_corpus.db.gz; fi
          python3 training/train.py || echo "training stage skipped"
          ls -la www/ | grep app_corpus
        env:
          KAI_DB: www/app_corpus.db
          KAI_OUT: www

      - name: Prepare and build APK
        run: |
          set -e
          cordova create build com.kai.app KAI
          rm -rf build/www
          cp -r www build/www
          cp config.xml build/config.xml
          # training already produced raw www/app_corpus.db; drop any .gz so we ship raw only
          find build/www -name "*.gz" -delete
          ls -la build/www | grep -E "app_corpus|\.db"
          ls -la build/www
          cd build
          cordova platform add android@12
          cordova plugin add cordova-plugin-android-permissions || true
          cordova plugin add cordova-plugin-file || true
          cordova plugin add cordova-plugin-inappbrowser || true
          # local-notification plugins are abandoned/Gradle-incompatible — rely on Web Notification API instead (works while app is open)
          GRADLE_FILE=$(find platforms/android -name "build.gradle" -path "*app*" | head -1)
          if [ -n "$GRADLE_FILE" ]; then
            echo "android { androidResources { noCompress 'db','wasm' } }" >> "$GRADLE_FILE"
          fi
          cordova build android --debug -- --packageType=apk

      - name: Re-sign (v1+v2+v3)
        id: apk
        run: |
          BT=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          RAW=$(find "$GITHUB_WORKSPACE" -name "app-debug.apk" -path "*outputs/apk*" | head -1)
          echo "Raw APK: $RAW"
          "$BT/zipalign" -f -p 4 "$RAW" aligned.apk
          "$BT/apksigner" sign \
            --ks keystore/debug.keystore \
            --ks-pass pass:android --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --min-sdk-version 22 \
            --out KAI.apk \
            aligned.apk
          "$BT/apksigner" verify --print-certs KAI.apk || true
          echo "path=KAI.apk" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KAI-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kai-latest
          name: KAI APK (latest)
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: false
