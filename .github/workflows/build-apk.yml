name: Build KAI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy kai-brain edge function
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "No SUPABASE_ACCESS_TOKEN — already deployed via Supabase MCP connector"
            exit 0
          fi
          supabase functions deploy kai-brain \
            --project-ref hpjvnohzhpkopisfaemz \
            --no-verify-jwt
          echo "✓ kai-brain deployed"

  build-apk:
    runs-on: ubuntu-latest
    needs: deploy-supabase
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "platforms;android-33" "build-tools;33.0.2" "build-tools;34.0.0"

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Pin Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH
          echo "GRADLE_HOME=/opt/gradle-8.7" >> $GITHUB_ENV

      - name: Diagnose Java environment
        run: |
          echo "=== java -version ==="
          java -version
          echo "=== JAVA_HOME ==="
          echo "$JAVA_HOME"
          echo "=== which java ==="
          which java
          echo "=== JAVA_HOME_21_X64 (if set) ==="
          echo "${JAVA_HOME_21_X64:-not set}"
          echo "=== PATH ==="
          echo "$PATH"

      - name: Build APK
        id: buildapk
        continue-on-error: true
        run: |
          set -o pipefail
          exec > >(tee /tmp/build-full.log) 2>&1
          set -e
          echo "=== Java version at build time ==="
          java -version
          export JAVA_HOME="${JAVA_HOME_21_X64:-$JAVA_HOME}"
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "=== Forced JAVA_HOME: $JAVA_HOME ==="
          java -version
          cordova create build com.kai.app KAI
          rm -rf build/www
          cp -r www build/www
          cp config.xml build/config.xml
          cd build
          cordova platform add android@12
          echo "=== DEBUG: platforms/android/cordova contents right after platform add ==="
          ls -la platforms/android/cordova/ || echo "cordova/ dir MISSING"
          echo "=== DEBUG: config.xml plugin entries ==="
          grep -i plugin config.xml || echo "no plugin entries in config.xml"
          # cordova-android@12 bundles its own Gradle wrapper (7.6) which can't
          # parse Java 21 bytecode (e.g. from MediaPipe tasks-genai). Override
          # it to Gradle 8.7+ which supports both JDK 21 and toolchain compilation.
          mkdir -p platforms/android/gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-all.zip" > platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionBase=GRADLE_USER_HOME" >> platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> platforms/android/gradle/wrapper/gradle-wrapper.properties
          # Disable Jetifier: it exists only to rewrite legacy android.support.*
          # references into AndroidX. All our plugins (file, inappbrowser,
          # android-permissions, kai-gemma) are already AndroidX-native, so
          # Jetifier has nothing legitimate to transform — but it still tries
          # to parse every AAR including tasks-genai's, whose bytecode (Java 21
          # class file major version 65) its transformer can't read, crashing
          # the whole build with "Unsupported class file major version 65".
          # Turning it off skips that broken, unnecessary transform entirely.
          echo "android.enableJetifier=false" >> platforms/android/gradle.properties
          echo "android.useAndroidX=true" >> platforms/android/gradle.properties
          echo "=== DEBUG: platforms/android/cordova contents right before explicit plugin add ==="
          ls -la platforms/android/cordova/ || echo "cordova/ dir MISSING at this point"
          cordova plugin add cordova-plugin-android-permissions --verbose || true
          cordova plugin add cordova-plugin-file || true
          cordova plugin add cordova-plugin-inappbrowser || true
          cordova plugin add ../plugins/cordova-plugin-kai-gemma
          cordova build android --debug -- --packageType=apk

      - name: Upload build log on failure
        if: always() && steps.buildapk.outcome == 'failure'
        run: |
          set +e
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          LOGFILE="/tmp/build-full.log"
          if [ ! -f "$LOGFILE" ]; then
            echo "Build APK step failed before log file was created" > "$LOGFILE"
          fi
          tail -c 60000 "$LOGFILE" > /tmp/build-tail.log
          python3 scripts/upload_log.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail job if build actually failed
        if: steps.buildapk.outcome == 'failure'
        run: exit 1

      - name: Sign and align APK
        id: apk
        run: |
          set -e
          BT=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          echo "Build tools: $BT"
          RAW=$(find "$GITHUB_WORKSPACE" -name "app-debug.apk" | head -1)
          echo "Found APK: $RAW"
          "$BT/zipalign" -f -p 4 "$RAW" aligned.apk
          "$BT/apksigner" sign \
            --ks keystore/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --min-sdk-version 26 \
            --out KAI.apk \
            aligned.apk
          ls -lh KAI.apk
          echo "path=$GITHUB_WORKSPACE/KAI.apk" >> $GITHUB_OUTPUT

      - name: Get build tag
        id: tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          TAG=$(echo "$MSG" | grep -oP '(?<=Build )[A-Z0-9]+' | head -1)
          [ -z "$TAG" ] && TAG="$(date +%Y%m%d-%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: ${{ github.event.head_commit.message }}
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: KAI-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: warn
