name: Build APK + Deploy Supabase

on:
  push:
    branches: [main]

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy kai-brain
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "⚠ No SUPABASE_ACCESS_TOKEN — skipping (already deployed via MCP)"
            exit 0
          fi
          supabase functions deploy kai-brain \
            --project-ref hpjvnohzhpkopisfaemz \
            --no-verify-jwt
          echo "✓ kai-brain deployed"

  build-apk:
    runs-on: ubuntu-latest
    needs: deploy-supabase
    if: always()
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v2

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install dependencies
        run: '[ -f package.json ] && npm install || true'

      - name: Add Android platform
        run: cordova platform add android --save

      - name: Build release APK
        run: cordova build android --release

      - name: Sign and zipalign APK
        run: |
          set -e
          APK_DIR="platforms/android/app/build/outputs/apk/release"
          
          # Find the APK (could be unsigned or already named differently)
          UNSIGNED=$(find "$APK_DIR" -name "*unsigned*.apk" | head -1)
          [ -z "$UNSIGNED" ] && UNSIGNED=$(find "$APK_DIR" -name "*.apk" ! -name "kai.apk" | head -1)
          echo "Found APK: $UNSIGNED"
          
          KS="$GITHUB_WORKSPACE/keystore/debug.keystore"
          
          # Sign in-place
          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$KS" \
            -storepass android \
            -keypass android \
            "$UNSIGNED" \
            androiddebugkey
          echo "✓ signed"
          
          # zipalign: input and output MUST be different files
          ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -name "zipalign" -type f | sort -V | tail -1)
          echo "zipalign: $ZIPALIGN"
          "$ZIPALIGN" -f -v 4 "$UNSIGNED" "$APK_DIR/kai.apk"
          echo "✓ aligned"
          ls -lh "$APK_DIR/kai.apk"

      - name: Get release tag
        id: tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          TAG=$(echo "$MSG" | grep -oP '(?<=Build )[A-Z0-9]+' | head -1)
          [ -z "$TAG" ] && TAG="$(date +%Y%m%d-%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: ${{ github.event.head_commit.message }}
          files: platforms/android/app/build/outputs/apk/release/kai.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
