name: Build APK + Deploy Supabase

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ── Deploy Edge Function to Supabase ───────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy kai-brain edge function
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "⚠ SUPABASE_ACCESS_TOKEN not set — skipping edge function deploy"
            echo "To enable: go to supabase.com/dashboard/account/tokens, create a token,"
            echo "then add it as SUPABASE_ACCESS_TOKEN in GitHub repo Settings > Secrets"
            exit 0
          fi
          supabase functions deploy kai-brain \
            --project-ref hpjvnohzhpkopisfaemz \
            --no-verify-jwt
          echo "✓ Edge function deployed to Supabase"

      # ── Build Android APK ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Add Android platform
        run: cordova platform add android --save

      - name: Build APK
        run: cordova build android --release

      - name: Sign APK
        run: |
          APK_DIR="platforms/android/app/build/outputs/apk/release"
          cd "$APK_DIR"
          KS="$GITHUB_WORKSPACE/keystore/debug.keystore"
          BT=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          jarsigner -verbose \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$KS" -storepass android -keypass android \
            app-release-unsigned.apk androiddebugkey
          "$ANDROID_HOME/build-tools/$BT/zipalign" -v 4 \
            app-release-unsigned.apk kai.apk
          echo "✓ APK signed: $APK_DIR/kai.apk"

      - name: Get build tag
        id: tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          TAG=$(echo "$MSG" | grep -oP '(?<=Build )[A-Z]+' | head -1)
          if [ -z "$TAG" ]; then TAG="BUILD-$(date +%Y%m%d%H%M)"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: ${{ github.event.head_commit.message }}
          files: platforms/android/app/build/outputs/apk/release/kai.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
