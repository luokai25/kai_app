name: Build KAI APK

on:
  push:
    branches: [main]

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy kai-brain edge function
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "No SUPABASE_ACCESS_TOKEN — edge function already deployed via MCP connector"
            exit 0
          fi
          supabase functions deploy kai-brain \
            --project-ref hpjvnohzhpkopisfaemz \
            --no-verify-jwt
          echo "✓ kai-brain deployed"

  build-apk:
    runs-on: ubuntu-latest
    needs: deploy-supabase
    if: always()
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v2

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install npm dependencies
        run: '[ -f package.json ] && npm install || echo "no package.json"'

      - name: Add Android platform
        run: cordova platform add android --save

      - name: Build release APK
        run: cordova build android --release

      - name: Find, sign and publish APK
        run: |
          set -e

          echo "=== All APKs produced ==="
          find platforms/android -name "*.apk" 2>/dev/null | sort
          echo "========================="

          # Pick the unsigned release APK
          UNSIGNED=$(find platforms/android -name "*unsigned*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find platforms/android -name "*.apk" | grep -v "test\|Test" | head -1)
          fi
          echo "Signing: $UNSIGNED"
          [ -z "$UNSIGNED" ] && echo "No APK found!" && exit 1

          KS="$GITHUB_WORKSPACE/keystore/debug.keystore"
          OUT="platforms/android/app/build/outputs/apk/release/kai.apk"
          mkdir -p "$(dirname $OUT)"

          # Use apksigner (comes with build-tools, handles sign+align in one step)
          BT_VER=$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BT_VER/apksigner"
          echo "Using apksigner: $APKSIGNER (build-tools $BT_VER)"

          if [ -f "$APKSIGNER" ]; then
            echo "--- Using apksigner ---"
            # apksigner can sign directly and outputs a signed file
            "$APKSIGNER" sign \
              --ks "$KS" \
              --ks-pass pass:android \
              --ks-key-alias androiddebugkey \
              --key-pass pass:android \
              --out "$OUT" \
              "$UNSIGNED"
            echo "✓ apksigner done"
          else
            echo "--- apksigner not found, falling back to jarsigner + zipalign ---"
            jarsigner \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              -keystore "$KS" \
              -storepass android \
              -keypass android \
              "$UNSIGNED" androiddebugkey
            echo "✓ jarsigner done"

            ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -name "zipalign" -type f | sort -V | tail -1)
            echo "zipalign: $ZIPALIGN"
            "$ZIPALIGN" -f 4 "$UNSIGNED" "$OUT"
            echo "✓ zipalign done"
          fi

          echo "=== Final APK ==="
          ls -lh "$OUT"

      - name: Get release tag
        id: tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          TAG=$(echo "$MSG" | grep -oP '(?<=Build )[A-Z0-9]+' | head -1)
          [ -z "$TAG" ] && TAG="$(date +%Y%m%d-%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: ${{ github.event.head_commit.message }}
          files: platforms/android/app/build/outputs/apk/release/kai.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
