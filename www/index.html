<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0e0c">
<title>KAI</title>
<style>
  :root{
    --bg:#0f0e0c; --panel:#181613; --panel2:#211e19; --line:#2e2a23;
    --ink:#f3ead6; --gold:#ffd96b; --dim:#9a9078; --good:#8ce99a; --bad:#ff8787;
    --font:'Cormorant Garamond',Georgia,serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:Segoe UI,system-ui,-apple-system,sans-serif;font-size:15px;overflow:hidden}
  .app{height:100dvh;display:flex;flex-direction:column}
  .topbar{flex:0 0 auto;height:54px;display:flex;align-items:center;gap:10px;padding:0 12px;border-bottom:1px solid var(--line);background:var(--panel);position:relative;z-index:30}
  .iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--gold);font-size:18px;display:grid;place-items:center;cursor:pointer}
  .title{flex:1;font-family:var(--font);font-size:22px;color:var(--gold);letter-spacing:2px}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .status-dot.on{background:var(--good)}
  .status-dot.err{background:var(--bad)}
  .msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--bg);scroll-behavior:smooth}
  .msg{max-width:84%;padding:10px 14px;border-radius:14px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word;font-size:14px}
  .msg.me{background:var(--gold);color:#0a0a0a;align-self:flex-end;border-bottom-right-radius:5px}
  .msg.kai{background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:5px;margin-right:auto}
  .msg .used{margin-top:6px;padding-top:6px;border-top:1px solid var(--line);font-size:10px;color:var(--dim);font-family:monospace}
  .msg a.artifact{display:inline-block;background:var(--gold);color:#0a0a0a;padding:6px 12px;border-radius:8px;text-decoration:none;font-weight:600;margin:4px 4px 4px 0;font-size:13px}
  .msg a.artifact:active{opacity:.7}
  .msg.kai a{word-break:break-all}
  .composer{flex:0 0 auto;padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--panel);display:flex;gap:8px;align-items:flex-end}
  .composer textarea{flex:1;resize:none;max-height:120px;min-height:44px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:11px;font-size:15px;outline:none;font-family:inherit}
  .send{width:44px;height:44px;border-radius:10px;border:none;background:var(--gold);color:#0a0a0a;font-size:18px;cursor:pointer}
  .send:disabled{opacity:0.5}
  .modepill{font-size:10px;letter-spacing:1px;color:var(--dim);text-align:center;padding:3px;background:var(--panel)}

  /* sliding panels */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;bottom:0;width:88%;max-width:380px;background:var(--panel);z-index:50;transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .left{left:0;transform:translateX(-104%);border-right:1px solid var(--line)}
  .left.on{transform:translateX(0)}
  .right{right:0;transform:translateX(104%);border-left:1px solid var(--line)}
  .right.on{transform:translateX(0)}
  .center-up{left:0;right:0;margin:0 auto;width:100%;max-width:680px;transform:translateY(105%);opacity:0;pointer-events:none;transition:.28s;height:100%}
  .center-up.on{transform:translateY(0);opacity:1;pointer-events:auto}
  .panel h3{font-family:var(--font);color:var(--gold);letter-spacing:2px;font-size:16px;margin:0;padding:16px 16px 8px}
  .panel .sec{padding:6px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-top:6px}
  .row{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;border-radius:10px;margin:1px 8px}
  .row:active{background:var(--panel2)}
  .row .ic{width:22px;text-align:center;opacity:.85}
  .chatlist{flex:1;overflow-y:auto}
  .chatitem{padding:10px 16px;margin:1px 8px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chatitem:active,.chatitem.active{background:var(--panel2)}
  .field{padding:8px 16px}
  .field label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:11px;font-size:14px;outline:none;font-family:inherit}
  .field textarea{min-height:80px;resize:vertical}
  .btn-row{display:flex;gap:6px;padding:10px 16px}
  .tm-btn{flex:1;text-align:center;padding:10px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--gold);cursor:pointer;font-size:13px}
  .tm-btn.primary{background:var(--gold);color:#0a0a0a;border:none}
  .tm-btn.danger{background:#3a1f1f;color:#ff8787}
  .empty{padding:20px;color:var(--dim);text-align:center;font-size:13px}
  .proj-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .proj-dot.running{background:var(--good)}
  .proj-dot.done{background:#5c7cfa}
  .proj-dot.paused{background:#fab005}
  .proj-dot.error{background:var(--bad)}
  .proj-dot.idle{background:var(--dim)}
  .log-line{font-family:monospace;font-size:11px;padding:2px 0;color:var(--dim)}
  .log-line.step{color:var(--good)}
  .log-line.error{color:var(--bad)}
  .log-line.file{color:#74c0fc}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="iconbtn" id="openMenu">☰</button>
    <div class="title">KAI</div>
    <div class="status-dot" id="srvDot" title="server status"></div>
    <button class="iconbtn" id="openComputer" title="KAI Computer">💻</button>
    <button class="iconbtn" id="newChatBtn">+</button>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="modepill" id="modepill">connecting…</div>
  <div class="composer">
    <textarea id="input" placeholder="message kai…" rows="1"></textarea>
    <button class="send" id="sendBtn">↑</button>
  </div>
</div>

<!-- LEFT MENU: chats + settings -->
<div class="scrim" id="scrimL"></div>
<div class="panel left" id="panelL">
  <h3>KAI</h3>
  <div class="row" id="goSetup"><span class="ic">⚙</span> Setup / API key</div>
  <div class="row" id="goNotes"><span class="ic">📝</span> What KAI remembers</div>
  <div class="sec">Chats</div>
  <div class="chatlist" id="chatlist"></div>
</div>

<!-- SETUP PANEL -->
<div class="scrim" id="scrimS"></div>
<div class="panel right" id="panelS">
  <h3>Setup</h3>
  <div class="field"><label>Server URL</label><input id="srvUrl" placeholder="https://...supabase.co/functions/v1/kai-brain"></div>
  <div class="field"><label>Device secret (≥16 chars, generated for you)</label><input id="devSecret" readonly></div>
  <div class="field"><label>Status</label><div id="enrollStat" style="font-size:13px;color:var(--dim)">not connected</div></div>
  <div class="btn-row"><button class="tm-btn primary" id="doEnroll">Connect</button></div>
  <div class="sec">Provider key (Groq, OpenAI, etc.)</div>
  <div class="field"><label>Provider</label>
    <select id="provSel">
      <option value="groq">Groq (recommended — fastest, free tier)</option>
      <option value="openai">OpenAI</option>
      <option value="cerebras">Cerebras</option>
      <option value="mistral">Mistral</option>
      <option value="anthropic">Anthropic</option>
    </select>
  </div>
  <div class="field"><label>API key</label><input id="apiKey" type="password" placeholder="gsk_... or sk-..."></div>
  <div class="btn-row"><button class="tm-btn primary" id="saveKey">Save key on server</button></div>
  <div class="field"><label>Danger zone</label></div>
  <div class="btn-row"><button class="tm-btn danger" id="forgetDev">Forget this device</button></div>
</div>

<!-- KAI COMPUTER PANEL -->
<div class="scrim" id="scrimC"></div>
<div class="panel center-up" id="panelC">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line)">
    <h3 style="padding:0">💻 KAI Computer</h3>
    <div>
      <button class="tm-btn" id="cRefresh">↻</button>
      <button class="tm-btn" id="cClose">✕</button>
    </div>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">
    <div style="width:38%;border-right:1px solid var(--line);overflow-y:auto">
      <div class="sec" style="padding:8px">Projects</div>
      <div id="projList"></div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px">
      <div id="projDetail" class="empty">Select a project to view.<br>KAI creates these when you ask for multi-step work.</div>
    </div>
  </div>
</div>

<!-- NOTES PANEL -->
<div class="scrim" id="scrimN"></div>
<div class="panel right" id="panelN">
  <h3>What KAI remembers</h3>
  <div id="notesList" style="flex:1;overflow-y:auto;padding:0 8px"></div>
  <div class="btn-row"><button class="tm-btn primary" id="addNote">+ Add note</button></div>
</div>

<script src="app.js"></script>
</body>
</html>
