name: Build KAI APK

on:
  push:
    branches: [main]

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy kai-brain edge function
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "No SUPABASE_ACCESS_TOKEN — already deployed via Supabase MCP"
            exit 0
          fi
          supabase functions deploy kai-brain \
            --project-ref hpjvnohzhpkopisfaemz \
            --no-verify-jwt
          echo "✓ kai-brain deployed"

  build-apk:
    runs-on: ubuntu-latest
    needs: deploy-supabase
    if: always()
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v2

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install dependencies
        run: '[ -f package.json ] && npm install || echo "no package.json"'

      - name: Add Android platform
        run: cordova platform add android --save

      - name: Build APK
        run: cordova build android --release

      - name: Sign, align and package APK
        run: |
          set -e

          echo "=== Listing all APKs ==="
          find platforms/android -name "*.apk" 2>/dev/null | sort || echo "No APKs found"
          echo "========================"

          # Pick unsigned APK (Cordova release without build.json produces this)
          UNSIGNED=$(find platforms/android -name "*unsigned*.apk" 2>/dev/null | head -1)
          # If no unsigned, pick any release APK
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find platforms/android -name "*.apk" 2>/dev/null | grep -i "release" | head -1)
          fi
          # Last resort: any APK
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find platforms/android -name "*.apk" 2>/dev/null | head -1)
          fi

          if [ -z "$UNSIGNED" ]; then
            echo "ERROR: No APK found after build!"
            ls -la platforms/android/app/build/outputs/ 2>/dev/null || echo "outputs dir missing"
            exit 1
          fi

          echo "Using APK: $UNSIGNED"
          KS="$GITHUB_WORKSPACE/keystore/debug.keystore"

          # Sign with jarsigner
          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$KS" \
            -storepass android \
            -keypass android \
            "$UNSIGNED" \
            androiddebugkey
          echo "✓ Signed"

          # Verify signature
          jarsigner -verify "$UNSIGNED" && echo "✓ Signature valid" || echo "⚠ Signature verify warning"

          # zipalign to a new file (must be different path)
          BT=$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)
          ZIPALIGN="$ANDROID_HOME/build-tools/$BT/zipalign"
          mkdir -p out
          "$ZIPALIGN" -f -v 4 "$UNSIGNED" out/kai.apk
          echo "✓ Aligned"
          ls -lh out/kai.apk

      - name: Get release tag
        id: tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          TAG=$(echo "$MSG" | grep -oP '(?<=Build )[A-Z0-9]+' | head -1)
          [ -z "$TAG" ] && TAG="$(date +%Y%m%d-%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: ${{ github.event.head_commit.message }}
          files: out/kai.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
